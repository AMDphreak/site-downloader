# Local/offline playbook: no site URL, relative links, output to build/site-offline.
# Run from repo root: antora antora-playbook-local.yml
site:
  title: Site Downloader
  start_page: site-downloader::index.adoc
content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs
ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: docs/node_modules/antora-dark-theme/supplemental-ui
output:
  dir: ./build/site-offline
antora:
  extensions:
    - '@antora/collector-extension'
